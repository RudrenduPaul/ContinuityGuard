name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22 is Active LTS, 24 is the current LTS line -- both currently
        # supported per the Node.js release schedule at the time this
        # workflow was written. No EOL Node version is tested here.
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test:coverage

      - name: Security audit (no unfixed HIGH/CRITICAL CVEs)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Verify zero-network guarantee
        run: node scripts/verify-zero-network.mjs

      - name: Run CLI against committed fixtures (smoke test)
        run: node dist/cli.js scan src/score/testdata/clips --json
